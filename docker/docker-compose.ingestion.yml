version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: regulaforge
      POSTGRES_PASSWORD: regulaforge
      POSTGRES_DB: regulaforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regulaforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: ..
      dockerfile: docker/ingestion.Dockerfile
    environment:
      REGULAFORGE_ENVIRONMENT: development
      REGULAFORGE_DB_URL: postgresql+asyncpg://regulaforge:regulaforge@postgres:5432/regulaforge
      REGULAFORGE_CACHE_URL: redis://redis:6379/0
      REGULAFORGE_INGESTION_RAW_STORAGE_PATH: /data/regulaforge/ingestion/raw
      REGULAFORGE_INGESTION_TEXT_STORAGE_PATH: /data/regulaforge/ingestion/text
      REGULAFORGE_INGESTION_SCHEDULER_ENABLED: "true"
      REGULAFORGE_INGESTION_MAX_CONCURRENT_DOWNLOADS: "5"
    ports:
      - "8000:8000"
    volumes:
      - ingestion_data:/data/regulaforge/ingestion
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  ingestion_data:
