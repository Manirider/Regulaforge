# =============================================================================
# RegulaForge - Production Docker Compose
# Full stack: frontend, API, database, cache, broker, monitoring, MLflow
# =============================================================================
# Usage:
#   docker compose --env-file .env -f docker/docker-compose.yml up -d
#   docker compose --profile monitoring -f docker/docker-compose.yml up -d
#   docker compose --profile ml -f docker/docker-compose.yml up -d
# =============================================================================

name: regulaforge

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

x-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-restart: &default-restart
  restart: unless-stopped

services:
  # ─── Frontend (Nginx + React SPA) ──────────────────────────────────────
  frontend:
    <<: [*default-restart]
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: regulaforge/frontend:latest
    container_name: regulaforge-frontend
    ports:
      - "80:80"
    environment:
      NGINX_PORT: 80
      API_HOST: api
      API_PORT: 8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - regulaforge

  # ─── API Server ──────────────────────────────────────────────────────────
  api:
    <<: [*default-restart]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: regulaforge/api:latest
    container_name: regulaforge-api
    expose:
      - "8000"
    env_file:
      - ../.env.production
    environment:
      REGULAFORGE_DB_URL: postgresql+asyncpg://regulaforge:${DB_PASSWORD:?}@db:5432/regulaforge
      REGULAFORGE_CACHE_URL: redis://:${REDIS_PASSWORD}@cache:6379/0
      REGULAFORGE_BROKER_URL: amqp://guest:${RABBITMQ_DEFAULT_PASS}@broker:5672/
      REGULAFORGE_SECURITY_SECRET_KEY: ${SECRET_KEY:?}
      REGULAFORGE_AI_LLM_API_KEY: ${LLM_API_KEY:-}
      REGULAFORGE_MONITORING_SENTRY_DSN: ${SENTRY_DSN:-}
      REGULAFORGE_PROMETHEUS_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      broker:
        condition: service_healthy
    volumes:
      - regulaforge_data:/data/regulaforge
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      start_period: 40s
    logging: *default-logging
    networks:
      - regulaforge
    secrets:
      - db_password
      - secret_key
      - llm_api_key

  # ─── Database ────────────────────────────────────────────────────────────
  db:
    <<: [*default-restart]
    image: postgres:16-alpine
    container_name: regulaforge-db
    expose:
      - "5432"
    environment:
      POSTGRES_DB: regulaforge
      POSTGRES_USER: regulaforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:?}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regulaforge -d regulaforge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - regulaforge

  # ─── Cache (Redis) ──────────────────────────────────────────────────────
  cache:
    <<: [*default-restart]
    image: redis:7-alpine
    container_name: regulaforge-cache
    expose:
      - "6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging: *default-logging
    networks:
      - regulaforge

  # ─── Message Broker (RabbitMQ) ──────────────────────────────────────────
  broker:
    <<: [*default-restart]
    image: rabbitmq:3.12-management-alpine
    container_name: regulaforge-broker
    expose:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - regulaforge

  # ─── Migration Job ──────────────────────────────────────────────────────
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: regulaforge/api:latest
    container_name: regulaforge-migrate
    profiles: ["migrate"]
    env_file:
      - ../.env.production
    environment:
      REGULAFORGE_DB_URL: postgresql+asyncpg://regulaforge:${DB_PASSWORD:?}@db:5432/regulaforge
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Migrations complete'
      "
    networks:
      - regulaforge
    secrets:
      - db_password

  # ─── MLflow Tracking Server ──────────────────────────────────────────────
  mlflow:
    <<: [*default-restart]
    profiles: ["ml", "all"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.mlflow
    image: regulaforge/mlflow:latest
    container_name: regulaforge-mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_TRACKING_USERNAME: admin
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD:-mlflow}
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://regulaforge:${DB_PASSWORD:?}@db:5432/regulaforge_mlflow
      MLFLOW_ARTIFACT_ROOT: /data/mlflow/artifacts
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - regulaforge_data:/data/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    networks:
      - regulaforge

  # ─── Prometheus ─────────────────────────────────────────────────────────
  prometheus:
    <<: [*default-restart]
    profiles: ["monitoring", "all"]
    image: prom/prometheus:v2.51.0
    container_name: regulaforge-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ../infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../infrastructure/monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging
    networks:
      - regulaforge

  # ─── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    <<: [*default-restart]
    profiles: ["monitoring", "all"]
    image: grafana/grafana:10.4.1
    container_name: regulaforge-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?}
      GF_SECURITY_SECRET_KEY: ${SECRET_KEY:?}
      GF_INSTALL_PLUGINS: grafana-piechart-panel, grafana-worldmap-panel
    volumes:
      - ../infrastructure/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ../infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../infrastructure/monitoring/grafana/dashboards/regulaforge-overview.json:/var/lib/grafana/dashboards/regulaforge-overview.json:ro
      - ../infrastructure/monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    logging: *default-logging
    networks:
      - regulaforge

  # ─── Loki (Log Aggregation) ─────────────────────────────────────────────
  loki:
    <<: [*default-restart]
    profiles: ["monitoring", "all"]
    image: grafana/loki:3.0.0
    container_name: regulaforge-loki
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    ports:
      - "3100:3100"
    volumes:
      - ../infrastructure/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/data/loki
    logging: *default-logging
    networks:
      - regulaforge

  # ─── Promtail (Log Shipper) ──────────────────────────────────────────────
  promtail:
    <<: [*default-restart]
    profiles: ["monitoring", "all"]
    image: grafana/promtail:3.0.0
    container_name: regulaforge-promtail
    command:
      - "-config.file=/etc/promtail/promtail-config.yml"
    volumes:
      - ../infrastructure/monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    logging: *default-logging
    networks:
      - regulaforge

  # ─── PostgreSQL Exporter ─────────────────────────────────────────────────
  postgres-exporter:
    <<: [*default-restart]
    profiles: ["monitoring", "all"]
    image: prometheuscommunity/postgres-exporter:v0.14.0
    container_name: regulaforge-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://regulaforge:${DB_PASSWORD:?}@db:5432/regulaforge?sslmode=disable
    expose:
      - "9187"
    depends_on:
      db:
        condition: service_healthy
    logging: *default-logging
    networks:
      - regulaforge

  # ─── Redis Exporter ─────────────────────────────────────────────────────
  redis-exporter:
    <<: [*default-restart]
    profiles: ["monitoring", "all"]
    image: oliver006/redis_exporter:v1.58.0-alpine
    container_name: regulaforge-redis-exporter
    environment:
      REDIS_ADDR: redis://cache:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "9121"
    depends_on:
      cache:
        condition: service_healthy
    logging: *default-logging
    networks:
      - regulaforge

  # ─── Node Exporter (Host Metrics) ───────────────────────────────────────
  node-exporter:
    <<: [*default-restart]
    profiles: ["monitoring", "all"]
    image: prom/node-exporter:v1.7.0
    container_name: regulaforge-node-exporter
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    logging: *default-logging
    networks:
      - regulaforge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  regulaforge_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  regulaforge:
    name: regulaforge
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

secrets:
  db_password:
    file: ../.secrets/db_password.txt
  secret_key:
    file: ../.secrets/secret_key.txt
  llm_api_key:
    file: ../.secrets/llm_api_key.txt
