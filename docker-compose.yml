# =============================================================================
# RegulaForge - Production Docker Compose
# =============================================================================

name: regulaforge

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

x-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-restart: &default-restart
  restart: unless-stopped

x-resources: &default-resources
  deploy:
    resources:
      limits:
        memory: ${BACKEND_MEM_LIMIT:-512M}
        cpus: ${BACKEND_CPU_LIMIT:-1.0}

services:
  postgres:
    <<: [*default-restart]
    image: postgres:16-alpine
    container_name: regulaforge-db
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-regulaforge}
      POSTGRES_USER: ${POSTGRES_USER:-regulaforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regulaforge} -d ${POSTGRES_DB:-regulaforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - regulaforge-net
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT:-1G}
          cpus: ${POSTGRES_CPU_LIMIT:-1.0}

  redis:
    <<: [*default-restart]
    image: redis:7-alpine
    container_name: regulaforge-redis
    expose:
      - "6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:?}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging: *default-logging
    networks:
      - regulaforge-net
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-256M}
          cpus: ${REDIS_CPU_LIMIT:-0.5}

  rabbitmq:
    <<: [*default-restart]
    image: rabbitmq:3.12-alpine
    container_name: regulaforge-rabbitmq
    expose:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - regulaforge-net
    deploy:
      resources:
        limits:
          memory: ${RABBITMQ_MEM_LIMIT:-512M}
          cpus: ${RABBITMQ_CPU_LIMIT:-1.0}

  backend:
    <<: [*default-restart]
    build:
      context: .
      dockerfile: Dockerfile
    image: regulaforge/backend:latest
    container_name: regulaforge-backend
    expose:
      - "8000"
    environment:
      REGULAFORGE_ENVIRONMENT: ${REGULAFORGE_ENVIRONMENT:-production}
      REGULAFORGE_DB_URL: postgresql+asyncpg://${POSTGRES_USER:-regulaforge}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-regulaforge}
      REGULAFORGE_CACHE_URL: redis://:${REDIS_PASSWORD:?}@redis:6379/0
      REGULAFORGE_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:?}@rabbitmq:5672/${RABBITMQ_VHOST:-%2F}
      REGULAFORGE_SECRET_KEY: ${SECRET_KEY:?}
      REGULAFORGE_LOG_LEVEL: ${LOG_LEVEL:-info}
      REGULAFORGE_PROMETHEUS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      start_period: 40s
    logging: *default-logging
    networks:
      - regulaforge-net
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEM_LIMIT:-1G}
          cpus: ${BACKEND_CPU_LIMIT:-2.0}

  docintel:
    <<: [*default-restart]
    build:
      context: .
      dockerfile: docker/docintel.Dockerfile
    image: regulaforge/docintel:latest
    container_name: regulaforge-docintel
    ports:
      - "${DOCINTEL_PORT:-8100}:8100"
    environment:
      REGULAFORGE_ENVIRONMENT: ${REGULAFORGE_ENVIRONMENT:-production}
      REGULAFORGE_LOG_LEVEL: ${LOG_LEVEL:-info}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-eng}
      TESSERACT_CMD: ${TESSERACT_CMD:-tesseract}
    volumes:
      - model-cache:/root/.cache
      - upload-data:/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/documents/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging
    networks:
      - regulaforge-net
    profiles:
      - docintel
      - all
    deploy:
      resources:
        limits:
          memory: ${DOCINTEL_MEM_LIMIT:-2G}
          cpus: ${DOCINTEL_CPU_LIMIT:-2.0}

  frontend:
    <<: [*default-restart]
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: regulaforge/frontend:latest
    container_name: regulaforge-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - regulaforge-net
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEM_LIMIT:-256M}
          cpus: ${FRONTEND_CPU_LIMIT:-0.5}

  prometheus:
    <<: [*default-restart]
    image: prom/prometheus:latest
    container_name: regulaforge-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging
    networks:
      - regulaforge-net
    deploy:
      resources:
        limits:
          memory: ${PROMETHEUS_MEM_LIMIT:-1G}
          cpus: ${PROMETHEUS_CPU_LIMIT:-1.0}

  grafana:
    <<: [*default-restart]
    image: grafana/grafana:latest
    container_name: regulaforge-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?}
      GF_SECURITY_SECRET_KEY: ${SECRET_KEY:?}
      GF_INSTALL_PLUGINS: grafana-piechart-panel, grafana-worldmap-panel
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    logging: *default-logging
    networks:
      - regulaforge-net
    deploy:
      resources:
        limits:
          memory: ${GRAFANA_MEM_LIMIT:-512M}
          cpus: ${GRAFANA_CPU_LIMIT:-1.0}

volumes:
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  model-cache:
    driver: local
  upload-data:
    driver: local

networks:
  regulaforge-net:
    name: regulaforge-net
    driver: bridge
