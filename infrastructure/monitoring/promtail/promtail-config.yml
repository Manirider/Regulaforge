# =============================================================================
# RegulaForge - Promtail Configuration
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /data/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batch_size: 1048576  # 1MB
    batch_wait: 5s

scrape_configs:
  # ─── API (JSON logs) ──────────────────────────────────────────────────────
  - job_name: api
    static_configs:
      - targets:
          - localhost
        labels:
          job: regulaforge-api
          service: api
          __path__: /var/log/regulaforge/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            service: service
            correlation_id: correlation_id
            request_id: request_id
            user_id: user_id
            message: message
            exception: exception
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
          service:
          correlation_id:

  # ─── Nginx access logs (JSON) ─────────────────────────────────────────────
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          service: frontend
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - json:
          expressions:
            remote_addr: remote_addr
            request: request
            status: status
            request_time: request_time
            upstream_response_time: upstream_response_time
            http_user_agent: http_user_agent
      - metrics:
          nginx_http_requests_total:
            type: Counter
            description: "Total Nginx HTTP requests"
            prefix: regulaforge_
            config:
              match_all: true
              action: inc
          nginx_http_response_time:
            type: Histogram
            description: "Nginx request duration"
            prefix: regulaforge_
            config:
              buckets: [0.1, 0.5, 1, 2, 5]
              action: inc

  # ─── Nginx error logs ─────────────────────────────────────────────────────
  - job_name: nginx-errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-errors
          service: frontend
          __path__: /var/log/nginx/error.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] .*?: (?P<message>.*)'
      - timestamp:
          source: timestamp
          format: "2006/01/02 15:04:05"
      - labels:
          level:

  # ─── Docker container logs ────────────────────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_log_stream]
        target_label: log_stream
