# =============================================================================
# RegulaForge - Grafana Configuration
# =============================================================================

[server]
domain = grafana.regulaforge.example.com
root_url = %(protocol)s://%(domain)s/
serve_from_sub_path = false
http_port = 3000
protocol = http
enable_gzip = true
static_root_path = public

[security]
admin_user = ${GF_SECURITY_ADMIN_USER:-admin}
admin_password = ${GF_SECURITY_ADMIN_PASSWORD}
secret_key = ${GF_SECURITY_SECRET_KEY}
disable_gravatar = true
cookie_secure = true
cookie_samesite = strict
content_security_policy = true
content_security_policy_template = """script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; object-src 'none'; frame-ancestors 'self'"""

[auth]
disable_login_form = false
oauth_auto_login = false
signout_redirect_url =

[auth.anonymous]
enabled = false

[users]
default_theme = dark
auto_assign_org = true
auto_assign_org_role = Viewer
allow_sign_up = false
allow_org_create = false

[data_proxy]
logging = true
timeout = 30

[analytics]
reporting_enabled = false
check_for_updates = false

[log]
mode = console
level = info
filters = rendering:warning

[log.console]
format = json

[metrics]
enabled = true
interval_seconds = 10
basic_auth_username = ${GF_METRICS_USER:-metrics}
basic_auth_password = ${GF_METRICS_PASSWORD}

[alerting]
enabled = true
execute_alerts = true
concurrent_render_limit = 5

[unified_alerting]
enabled = true

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/regulaforge-overview.json
versions_to_keep = 20

[explore]
enabled = true

[plugins]
enable_alpha = false
allow_loading_unsigned_plugins =
