apiVersion: v1
kind: ConfigMap
metadata:
  name: regulaforge-api-config
  labels:
    app.kubernetes.io/name: regulaforge-api
    app.kubernetes.io/component: api
data:
  REGULAFORGE_ENVIRONMENT: "production"
  REGULAFORGE_LOG_LEVEL: "info"
  REGULAFORGE_API_HOST: "0.0.0.0"
  REGULAFORGE_API_PORT: "8000"
  REGULAFORGE_API_WORKERS: "4"
  REGULAFORGE_API_LOOP: "uvloop"
  REGULAFORGE_API_HTTP: "httptools"
  REGULAFORGE_DB_HOST: "regulaforge-db"
  REGULAFORGE_DB_PORT: "5432"
  REGULAFORGE_DB_NAME: "regulaforge"
  REGULAFORGE_DB_USER: "regulaforge"
  REGULAFORGE_CACHE_HOST: "regulaforge-cache"
  REGULAFORGE_CACHE_PORT: "6379"
  REGULAFORGE_CACHE_DB: "0"
  REGULAFORGE_BROKER_HOST: "regulaforge-broker"
  REGULAFORGE_BROKER_PORT: "5672"
  REGULAFORGE_BROKER_VHOST: "/"
  REGULAFORGE_BROKER_USER: "guest"
  REGULAFORGE_AI_MODEL: "gpt-4"
  REGULAFORGE_AI_TEMPERATURE: "0.2"
  REGULAFORGE_AI_MAX_TOKENS: "4096"
  REGULAFORGE_MONITORING_ENABLED: "true"
  REGULAFORGE_MONITORING_METRICS_PATH: "/api/v1/metrics"
  REGULAFORGE_MONITORING_SENTRY_ENABLED: "true"
  REGULAFORGE_MONITORING_SENTRY_TRACES_SAMPLE_RATE: "0.1"
  REGULAFORGE_CORS_ORIGINS: "https://regulaforge.example.com"
  REGULAFORGE_CORS_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
  REGULAFORGE_CORS_HEADERS: "Authorization,Content-Type,X-Request-ID"
  REGULAFORGE_RATE_LIMIT_ENABLED: "true"
  REGULAFORGE_RATE_LIMIT_REQUESTS: "100"
  REGULAFORGE_RATE_LIMIT_WINDOW: "60"
  REGULAFORGE_UPLOAD_MAX_SIZE: "104857600"
  REGULAFORGE_UPLOAD_ALLOWED_EXTENSIONS: ".pdf,.docx,.txt,.json,.yaml,.csv"
