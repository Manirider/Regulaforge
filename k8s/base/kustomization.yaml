apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: regulaforge

resources:
  - namespace.yaml
  - api-configmap.yaml
  - api-secret.yaml
  - serviceaccount.yaml
  - api-deployment.yaml
  - api-service.yaml
  - api-hpa.yaml
  - ingress.yaml
  - pdb.yaml
  - network-policy.yaml

commonLabels:
  app.kubernetes.io/part-of: regulaforge
  app.kubernetes.io/managed-by: kustomize
