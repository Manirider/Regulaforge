apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: regulaforge-prod

namePrefix: prod-

commonLabels:
  app.kubernetes.io/environment: production
  app.kubernetes.io/version: v1.0.0

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "4Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "4"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "8Gi"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: REGULAFORGE_ENVIRONMENT
          value: production
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: REGULAFORGE_LOG_LEVEL
          value: info
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: REGULAFORGE_MONITORING_ENABLED
          value: "true"
    target:
      kind: Deployment
      name: regulaforge-api

configMapGenerator:
  - name: regulaforge-api-config
    behavior: merge
    literals:
      - REGULAFORGE_ENVIRONMENT=production
      - REGULAFORGE_LOG_LEVEL=info
      - REGULAFORGE_CORS_ORIGINS=https://app.regulaforge.example.com
      - REGULAFORGE_MONITORING_ENABLED=true
      - REGULAFORGE_MONITORING_SENTRY_ENABLED=true
      - REGULAFORGE_MONITORING_SENTRY_TRACES_SAMPLE_RATE=0.1

secretGenerator:
  - name: regulaforge-api-secret
    behavior: merge
    literals:
      - REGULAFORGE_SECURITY_SECRET_KEY=prod-secret-key-here
      - REGULAFORGE_DB_PASSWORD=prod-db-password-here
      - REGULAFORGE_AI_LLM_API_KEY=prod-llm-api-key-here
      - REGULAFORGE_MONITORING_SENTRY_DSN=https://example@sentry.regulaforge.example.com/1

images:
  - name: regulaforge/api
    newTag: v1.0.0
